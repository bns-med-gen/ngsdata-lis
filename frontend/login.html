<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>LIS Auth Test Login</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
  <style>
    body { padding-top: 40px; }
    .login-panel { max-width: 420px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="container login-panel">
    <div class="panel panel-default">
      <div class="panel-heading">
        <h3 class="panel-title">Тестовый вход через auth_test</h3>
      </div>
      <div class="panel-body">
        <form id="login-form" method="post">
          <div class="form-group">
            <label for="username">Имя пользователя</label>
            <input type="text" class="form-control" id="username" name="username" value="test" required>
          </div>
          <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" class="form-control" id="password" name="password" value="test" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Войти</button>
        </form>
        <div id="login-result" class="alert" style="display:none; margin-top:15px;"></div>
      </div>
    </div>
    <div class="text-center">
      <a href="index.html">Перейти к приложению</a>
    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    $(function() {
      $('#login-form').on('submit', function(e) {
        e.preventDefault();
        const username = $('#username').val().trim();
        const password = $('#password').val().trim();

        $('#login-result').hide();

        $.ajax({
          url: 'http://localhost:8000/auth/login/',
          method: 'POST',
          xhrFields: { withCredentials: true },
          crossDomain: true,
          data: { username, password },
          success(data) {
            if (data.access) {
              setAccessToken(data.access);
              $('#login-result')
                .removeClass('alert-danger')
                .addClass('alert-success')
                .text('Успешно. Токен сохранён. Перенаправление...')
                .show();
              setTimeout(() => {
                window.location.href = 'index.html';
              }, 800);
            } else {
              $('#login-result')
                .removeClass('alert-success')
                .addClass('alert-danger')
                .text('Не удалось получить access token.')
                .show();
            }
          },
          error(xhr) {
            const message = xhr.responseJSON?.detail || 'Ошибка входа';
            $('#login-result')
              .removeClass('alert-success')
              .addClass('alert-danger')
              .text(message)
              .show();
          }
        });
      });
    });
  </script>
</body>
</html>
